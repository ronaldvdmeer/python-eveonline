name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Force-run integration tests (ESI_CLIENT_ID / ESI_CLIENT_SECRET / ESI_REFRESH_TOKEN secrets required)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests with coverage
        run: pytest

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Pylint
        run: pylint src/eveonline/

      - name: Mypy
        run: mypy src/

  integration:
    name: Integration Tests (live ESI)
    runs-on: ubuntu-latest
    needs: [test]
    # Run on every PR commit, push to main, and manual dispatch.
    # Authenticated tests skip automatically when ESI secrets are unavailable.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Fetch ESI access token
        # Exchanges the long-lived refresh token for a short-lived access token.
        # Exits cleanly (no-op) when secrets are not configured, e.g. on fork PRs.
        env:
          ESI_CLIENT_ID: ${{ secrets.ESI_CLIENT_ID }}
          ESI_CLIENT_SECRET: ${{ secrets.ESI_CLIENT_SECRET }}
          ESI_REFRESH_TOKEN: ${{ secrets.ESI_REFRESH_TOKEN }}
        run: python scripts/fetch_esi_token_ci.py

      - name: Run integration tests
        # Public tests always run. Authenticated tests skip automatically when
        # ESI_TOKEN is empty (i.e. secrets were not configured).
        env:
          ESI_TEST_CHARACTER_ID: ${{ secrets.ESI_TEST_CHARACTER_ID }}
        run: pytest tests/integration/ -m integration --no-cov -v

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
